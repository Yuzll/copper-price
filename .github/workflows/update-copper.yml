name: 每日更新铜价

on:
  schedule:
    # 每天北京时间 08:00 (UTC 00:00) — 长江有色网一般早间更新
    - cron: '0 0 * * *'
  # 也支持手动触发
  workflow_dispatch:

# 允许写入仓库
permissions:
  contents: write

jobs:
  update-copper:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行铜价爬虫
        run: python copper-crawler.py

      - name: 提交更新
        run: |
          git config user.name "copper-bot"
          git config user.email "copper-bot@users.noreply.github.com"
          git add copper.json
          if git diff --cached --quiet; then
            echo "NO_CHANGE=true" >> $GITHUB_ENV
            echo "铜价无变化，跳过提交"
          else
            echo "NO_CHANGE=false" >> $GITHUB_ENV
            git commit -m "chore: 更新铜价 $(date -u +'%Y-%m-%d')"
            git push
          fi
